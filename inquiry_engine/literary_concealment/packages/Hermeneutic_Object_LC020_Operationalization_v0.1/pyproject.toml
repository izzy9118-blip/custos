[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "custos-hermeneutic-object-lc020"
version = "0.1.0"
description = "Development-only executable projection of LC-020 from Strauss's Taxonomy of Literary Concealment"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7,<3",
  "jsonschema>=4.22,<5",
]

[project.optional-dependencies]
dev = ["pytest>=8.2,<10"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
