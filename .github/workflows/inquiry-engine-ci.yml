name: Inquiry Engine CI

on:
  pull_request:
    paths:
      - "amendments/**"
      - "candidates/**"
      - "engine_training/**"
      - "governance/**"
      - "inquiry_engine/**"
      - "ledgers/**"
      - "manifests/**"
      - "records/**"
      - "registers/**"
      - "specifications/**"
      - ".github/workflows/inquiry-engine-ci.yml"
  push:
    branches:
      - main
    paths:
      - "amendments/**"
      - "candidates/**"
      - "engine_training/**"
      - "governance/**"
      - "inquiry_engine/**"
      - "ledgers/**"
      - "manifests/**"
      - "records/**"
      - "registers/**"
      - "specifications/**"
      - ".github/workflows/inquiry-engine-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python 3.12 full suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: inquiry_engine/pyproject.toml

      - name: Install Inquiry Engine
        run: python -m pip install -e './inquiry_engine[dev]'

      - name: Run complete Inquiry Engine test suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q inquiry_engine/tests 2>&1 | tee pytest.log

      - name: Preserve pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inner-sanctum-pytest-log
          path: pytest.log
          if-no-files-found: error
