name: Inquiry Engine CI

on:
  pull_request:
    paths:
      - "inquiry_engine/**"
      - "ledgers/**"
      - ".github/workflows/inquiry-engine-ci.yml"
  push:
    branches:
      - main
    paths:
      - "inquiry_engine/**"
      - "ledgers/**"
      - ".github/workflows/inquiry-engine-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python 3.12 full suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: inquiry_engine/pyproject.toml

      - name: Install Inquiry Engine
        run: python -m pip install -e './inquiry_engine[dev]'

      - name: Run complete Inquiry Engine test suite
        run: python -m pytest -q inquiry_engine/tests
