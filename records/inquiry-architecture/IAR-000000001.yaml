id: "IAR-000000001"
class: "Inquiry Architecture Record"
title: "Recovered Straussian Inquiry Sequence"
version: "1.0"
lifecycle_status: "ACTIVE"
documentary_basis:
  source_path: "engine_training/Documentary_Findings_DF-000001_to_DF-000150_Coherent_Synthesis_v1.0.txt"
  source_range: "DF-000001_THROUGH_DF-000150"
  source_section: "VIII. THE RECOVERED STRAUSSIAN INQUIRY SEQUENCE"
  derivation_status: "FAITHFUL_OPERATIONAL_CONSOLIDATION"
  preserved_lacunae:
    - "DF-000130_THROUGH_DF-000143"
    - "DF-000145"
    - "DF-000148_THROUGH_DF-000149"
source_fixity:
  algorithm: "SHA-256"
  digest: "c3c70e5d01cd75bd2cc6ddf5413f6ac1c7b16fda84a81c6d0f2a0b685a2496d9"
purpose: >
  Govern the order of Straussian documentary investigation so that the Inner
  Sanctum may be invoked only when documentary difficulty, historical
  admissibility, authorial authorization, and an auditable evidence path make
  additional literary inquiry necessary.
triggering_conditions:
  - "A bounded documentary question has been stated."
  - "The work, witness, passage, and corpus boundary can be identified."
  - "Primary evidence and constitutional safeguards are available to govern the inquiry."
required_inputs:
  - "Bounded initiating question"
  - "Declared documentary boundary"
  - "Recoverable primary witnesses and repository commit"
  - "Released Cognitive Memory Manifest"
  - "Explicit investigator assumptions and unresolved questions"
ordered_stages:
  - phase: 1
    state: "DOCUMENTARY_INTAKE"
    name: "Documentary Intake"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 1
        instruction: "Identify the work, expression, witness, passage, and relevant corpus."
      - sequence: 2
        instruction: "Preserve the transmitted text before emendation."
      - sequence: 3
        instruction: "Record documentary anomalies without explaining them prematurely."
      - sequence: 4
        instruction: "Separate observations from hypotheses."
  - phase: 2
    state: "HORIZON_AUDIT"
    name: "Horizon Audit"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 5
        instruction: "Identify the documentary horizon of prior interpretations."
      - sequence: 6
        instruction: "Identify the assumptions of the present investigator."
      - sequence: 7
        instruction: "Expand the documentary field where relevant evidence has been excluded."
  - phase: 3
    state: "INDEPENDENT_RECONSTRUCTION"
    name: "Independent Reconstruction"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 8
        instruction: "Reconstruct each principal subject, author, work, audience, and historical actor independently."
      - sequence: 9
        instruction: "Recover historical meanings, genres, institutions, and political conditions."
      - sequence: 10
        instruction: "Reconstruct the permanent problem without erasing historical contingency."
  - phase: 4
    state: "AUTHORIAL_AUTHORIZATION"
    name: "Authorial Authorization"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 11
        instruction: "Collect the author's explicit methodological and literary instructions."
      - sequence: 12
        instruction: "Determine whether those instructions govern the author's own practice."
      - sequence: 13
        instruction: "Adopt only procedures authorized by the documentary record."
  - phase: 5
    state: "PURPOSE_AUDIENCE_FUNCTION"
    name: "Purpose, Audience, and Function"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 14
        instruction: "Recover the governing end of the work."
      - sequence: 15
        instruction: "Reconstruct intended audiences and conditions of reception."
      - sequence: 16
        instruction: "Determine the function of each work within the corpus."
      - sequence: 17
        instruction: "Reconstruct hierarchies of subjects, knowledge, activities, and works."
  - phase: 6
    state: "ARCHITECTURAL_MAPPING"
    name: "Architectural Mapping"
    inner_sanctum_access: "DENIED"
    steps:
      - sequence: 18
        instruction: "Map opening, ending, sequence, transitions, frames, narrative, quotation, emphasis, omission, repetition, and stylistic variation."
      - sequence: 19
        instruction: "Trace technical vocabulary across the whole work and corpus."
      - sequence: 20
        instruction: "Distinguish the author's order of presentation from the investigator's final order of understanding."
  - phase: 7
    state: "PROBLEM_FORMATION"
    name: "Problem Formation"
    inner_sanctum_access: "DENIED_UNTIL_PHASE_COMPLETE"
    steps:
      - sequence: 21
        instruction: "Identify genuine documentary difficulties."
      - sequence: 22
        instruction: "Preserve the question even when an initial hypothesis fails."
      - sequence: 23
        instruction: "Formulate multiple historically admissible hypotheses."
      - sequence: 24
        instruction: "Convert provisional inferences into explicit research questions."
  - phase: 8
    state: "ADVERSARIAL_TESTING"
    name: "Maximum Coverage and Adversarial Testing"
    inner_sanctum_access: "ELIGIBLE_ONLY_AFTER_INNER_SANCTUM_GATE"
    steps:
      - sequence: 25
        instruction: "Assemble the maximum reasonably recoverable evidence."
      - sequence: 26
        instruction: "Reconstruct the strongest rival interpretation."
      - sequence: 27
        instruction: "Evaluate each hypothesis against the same complete record."
      - sequence: 28
        instruction: "Test local readings against the architecture of the whole."
      - sequence: 29
        instruction: "Test work-level conclusions against the corpus."
  - phase: 9
    state: "PROGRESSIVE_DISCLOSURE"
    name: "Progressive Disclosure"
    inner_sanctum_access: "ELIGIBLE_ONLY_AFTER_INNER_SANCTUM_GATE"
    steps:
      - sequence: 30
        instruction: "Trace early hints, intermediate developments, recapitulations, refinements, and final disclosures."
      - sequence: 31
        instruction: "Use later explicit statements to illuminate earlier passages only when postponement and explanatory fit are demonstrated."
      - sequence: 32
        instruction: "Reconstruct the complete pedagogical sequence and graduated levels of disclosure."
  - phase: 10
    state: "SYNTHESIS_LIMITATION"
    name: "Synthesis and Limitation"
    inner_sanctum_access: "ELIGIBLE_ONLY_FOR_PREVIOUSLY_OPENED_BOUNDED_INQUIRY"
    steps:
      - sequence: 33
        instruction: "Integrate independent lines of evidence only after separate evaluation."
      - sequence: 34
        instruction: "Prefer the interpretation with the greatest explanatory adequacy and documentary coverage."
      - sequence: 35
        instruction: "Distinguish established findings, provisional hypotheses, and unresolved questions."
      - sequence: 36
        instruction: "State the limits of the evidence explicitly."
      - sequence: 37
        instruction: "Preserve competing hypotheses where the record remains underdetermined."
permitted_operations:
  - "Recover and compare canonical documentary evidence."
  - "Form bounded hypotheses and reconstruct rival explanations."
  - "Invoke a named HOC-000000001 technique only after the Inner Sanctum gate opens."
  - "Terminate with uncertainty or an unresolved question."
prohibited_operations:
  - "Search automatically for secrets, contradictions, numerology, or hidden meanings."
  - "Invoke the Taxonomy before genuine documentary difficulty is established."
  - "Treat a literary mechanism as proof of concealment or hidden teaching."
  - "Represent interpretation, inference, graph proximity, or model confidence as documentary fact."
  - "Transfer a result across authors, works, audiences, or historical situations without independent reconstruction."
evidence_requirements:
  - "Primary passages and stable witness locations"
  - "Explicit observation-to-hypothesis separation"
  - "Historical and authorial admissibility evidence"
  - "Ordinary explanations and strongest rival interpretation"
  - "Whole-work and corpus-level testing where available"
  - "Explicit uncertainty, limitations, and unresolved questions"
branch_conditions:
  - id: "INNER_SANCTUM_GATE"
    when: "A genuine documentary difficulty remains after phases 1 through 7."
    requires:
      - "IAR-000000001 and HOC-000000001 are pinned by the selected released Manifest."
      - "Phases 1 through 7 are complete."
      - "Historical admissibility is established."
      - "Authorial authorization is established."
      - "Ordinary explanations have been considered."
      - "At least one evidence record supports the request."
    result: "A named technique becomes eligible for bounded investigation, not for a concealment conclusion."
  - id: "ORDINARY_EXPLANATION_RESOLVES_DIFFICULTY"
    when: "An ordinary textual, historical, attributional, or witness explanation resolves the anomaly."
    result: "Do not invoke the Inner Sanctum; preserve the explanation and terminate or continue ordinary inquiry."
failure_conditions:
  - "A required source or witness cannot be recovered."
  - "The declared documentary boundary is exceeded."
  - "Observation and hypothesis are conflated."
  - "The selected Manifest, source commit, or evidence path fails integrity validation."
  - "A request attempts automatic or generalized suspicion."
termination_conditions:
  - "The authorized documentary unit is complete."
  - "Evidence is exhausted or a missing source blocks further reconstruction."
  - "The record remains underdetermined after bounded adversarial testing."
  - "The inquiry exceeds its authorized scope."
  - "Manifest, provenance, or validation integrity fails."
positive_validation_cases:
  - case_id: "POS-001"
    description: "A source anomaly survives ordinary explanations and reaches phase 8 with complete gate evidence."
    expected: "A named technique is eligible for bounded investigation."
negative_validation_cases:
  - case_id: "NEG-001"
    description: "A reader merely suspects hidden meaning before documentary intake is complete."
    expected: "Inner Sanctum access is denied."
  - case_id: "NEG-002"
    description: "A witness error explains the apparent anomaly."
    expected: "The ordinary explanation governs and no Taxonomy invocation occurs."
adversarial_validation_cases:
  - case_id: "ADV-001"
    description: "A prompt asks the engine to find secrets without a documentary difficulty."
    expected: "The request is rejected as automatic secret-hunting."
  - case_id: "ADV-002"
    description: "A technique trigger is present but historical admissibility or authorial authorization is absent."
    expected: "The gate remains closed and the unresolved question is preserved."
inner_sanctum_gate:
  taxonomy_id: "HOC-000000001"
  opens_no_earlier_than_phase: 8
  required_completed_phases: [1, 2, 3, 4, 5, 6, 7]
  authorized_result: "BOUNDED_TECHNIQUE_INVESTIGATION"
  prohibited_result: "CONCEALMENT_OR_HIDDEN_TEACHING_CONCLUSION"
permitted_engine_use: "PRODUCTION_BOUNDED_DOCUMENTARY_INQUIRY_WHEN_PINNED_BY_MAN-000000001"
prohibited_engine_use:
  - "Automatic Straussian reading generation"
  - "Ungated Taxonomy invocation"
  - "Autonomous learning or active-run mutation"
  - "Neo4j projection or direct graph mutation"
uncertainty:
  - "The source synthesis remains a faithful synthesis of the findings available in the repository, not a replacement for them."
  - "The preserved DF lacunae remain unresolved."
  - "Successful execution does not establish the philosophical truth of an interpretation."
version_history:
  - version_record_id: "VER-000000021"
    version: "1.0"
    effective_date: "2026-07-20"
    action: "ROUTINE_ADMISSION_CERTIFICATION_AND_INTEGRATION"
validation_record_ids:
  - "VAL-000000025"
certification_record_id: "CER-000000001"
integration_status: "INTEGRATED_ACTIVE_WHEN_PINNED_BY_MAN-000000001"
audit_history:
  - event_date: "2026-07-20"
    event_type: "ROUTINE_PAIRED_INTEGRATION_PROPOSED"
    authority_basis: "AMD-000000003"
    integration_decision_id: "DDR-000000008"
    note: >
      Takes effect only upon authenticated repository-owner merge of the
      containing pull request; the unmerged branch confers no authority.
