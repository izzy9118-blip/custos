identifier: STS-000000002
identifier_family: STS
class: Vocabulary Concept
preferred_english_label: SUPERSEDED
status_category: LIFECYCLE_STATUS
approved_localizations: []
aliases: []
formal_definition: 'SUPERSEDED indicates that a canonical repository object has been
  replaced for ordinary repository use by one or more successor canonical objects.
  The superseded object remains part of the permanent documentary record and continues
  to preserve its historical identity and audit history.

  '
scope_note: 'SUPERSEDED shall be assigned only after a constitutionally authorized
  supersession action. A superseded object is not deleted or invalidated; it remains
  recoverable and citable for historical and audit purposes, while ordinary repository
  operations shall use the designated successor object or objects.

  '
usage_guidance:
  use_when:
  - One or more canonical successor objects have been constitutionally admitted.
  - Ordinary repository use should transition to the designated successor object or
    objects.
  do_not_use_when:
  - The object remains current for ordinary repository use.
  - The object has been constitutionally withdrawn without replacement.
cardinality_and_cooccurrence_rules:
  cardinality: EXACTLY_ONE_CURRENT_LIFECYCLE_STATUS
  cooccurrence:
    permitted_with_review_dispute_status: true
    permitted_with_revision_status: true
    prohibited_with_other_current_lifecycle_statuses: true
related_concepts:
- label: ACTIVE
  identifier: STS-000000001
  assignment_status: ASSIGNED
- label: WITHDRAWN
  identifier: STS-000000003
  assignment_status: ASSIGNED
governed_ontology_classes:
- Repository Entity
relationship_integration:
  note: 'SUPERSEDED classifies the current lifecycle state of a canonical object.
    Repository history, derivation records, and relationship assertions record the
    supersession action and identify the successor object or objects.

    '
