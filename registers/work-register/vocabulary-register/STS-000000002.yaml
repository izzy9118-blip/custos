localization_guidance: 'Localizations shall preserve the meaning that the object has
  been replaced for ordinary constitutional use while remaining part of the permanent
  documentary record.

  '
implementation_notes: 'Implementations shall preserve explicit successor references
  outside this lifecycle concept. SUPERSEDED records the current constitutional state,
  while repository history records the action by which that state was reached.

  '
