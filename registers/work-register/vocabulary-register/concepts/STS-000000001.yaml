identifier: STS-000000001
identifier_family: STS
class: Vocabulary Concept
preferred_english_label: ACTIVE
status_category: LIFECYCLE_STATUS
approved_localizations: []
aliases: []
formal_definition: 'ACTIVE indicates that an admitted canonical repository object
  currently participates in ordinary repository use under its assigned constitutional
  identity and meaning.

  '
scope_note: 'ACTIVE applies to an admitted object that has not been superseded or
  withdrawn. ACTIVE does not imply permanence, incontestability, or immunity from
  constitutionally governed revision.

  '
usage_guidance:
  use_when:
  - The canonical object remains current for ordinary repository operations.
  - No governing lifecycle action has displaced its current use.
  do_not_use_when:
  - The object has been assigned a different governing lifecycle status.
  - The record is merely a candidate or pre-admission draft.
cardinality_and_cooccurrence_rules:
  cardinality: EXACTLY_ONE_CURRENT_LIFECYCLE_STATUS
  cooccurrence:
    permitted_with_review_dispute_status: true
    permitted_with_revision_status: true
    prohibited_with_other_current_lifecycle_statuses: true
related_concepts:
- label: SUPERSEDED
  identifier: STS-000000002
  assignment_status: ASSIGNED
- label: WITHDRAWN
  identifier: STS-000000003
  assignment_status: ASSIGNED
governed_ontology_classes:
- Repository Entity
relationship_integration:
  note: 'ACTIVE classifies the current lifecycle state of an admitted canonical repository
    object. It does not itself create a Relationship Assertion.

    '
