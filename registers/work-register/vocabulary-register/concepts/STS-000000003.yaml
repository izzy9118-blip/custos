identifier: STS-000000003
identifier_family: STS
class: Vocabulary Concept
preferred_english_label: WITHDRAWN
status_category: LIFECYCLE_STATUS
approved_localizations: []
aliases: []
formal_definition: 'WITHDRAWN indicates that a canonical repository object has been
  removed from ordinary constitutional repository use through an authorized governance
  decision. The object remains preserved for historical, documentary, and audit purposes.

  '
scope_note: 'WITHDRAWN shall be assigned only after a constitutionally authorized
  withdrawal decision. A withdrawn object is not deleted from the repository; it remains
  available for historical reference and audit while no longer participating in ordinary
  repository operations.

  '
usage_guidance:
  use_when:
  - A constitutional decision withdraws the object from ordinary repository use.
  do_not_use_when:
  - The object has been replaced by a successor (use SUPERSEDED).
  - The object remains current for ordinary repository use (use ACTIVE).
cardinality_and_cooccurrence_rules:
  cardinality: EXACTLY_ONE_CURRENT_LIFECYCLE_STATUS
  cooccurrence:
    permitted_with_review_dispute_status: true
    permitted_with_revision_status: true
    prohibited_with_other_current_lifecycle_statuses: true
related_concepts:
- label: ACTIVE
  identifier: STS-000000001
  assignment_status: ASSIGNED
- label: SUPERSEDED
  identifier: STS-000000002
  assignment_status: ASSIGNED
governed_ontology_classes:
- Repository Entity
relationship_integration:
  note: 'WITHDRAWN classifies the current lifecycle state only. The withdrawal decision,
    authority, and supporting evidence are preserved separately in repository governance
    and history.

    '
