localization_guidance: 'Localizations shall preserve the meaning of constitutional
  withdrawal without implying deletion of the historical record.

  '
implementation_notes: 'WITHDRAWN records only the current constitutional state. Repository
  governance artifacts preserve the reason for and authority behind the withdrawal.

  '
