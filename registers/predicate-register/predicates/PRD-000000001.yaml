identifier: "PRD-000000001"
class: "Predicate"
canonical_label: "CITES"
predicate_family: "Documentary Reference"
formal_definition: >
  CITES means that the subject explicitly identifies or references the object
  as a documentary source, authority, textual antecedent, or object of
  reference through a recoverable citation act.
scope_note: >
  A CITES assertion must represent an explicit citation. Mere thematic
  similarity, influence, derivation, quotation, or inferred dependence does
  not constitute CITES unless the citation itself is recoverable.
inverse_predicate:
  label: "IS_CITED_BY"
  identifier: null
  assignment_status: "PLANNED_NOT_ASSIGNED"
permitted_subject_classes:
  - "Citation"
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
permitted_object_classes:
  - "Citation"
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
cardinality:
  subject_to_object: "ZERO_OR_MORE"
  object_from_subjects: "ZERO_OR_MORE"
symmetry: false
asymmetry: false
transitivity: false
reflexivity: false
inferability:
  value: "NO"
  rule: null
inference_conditions: null
cycle_rule:
  policy: "ALLOWED"
  note: >
    Reciprocal or cyclic citation networks are valid when every individual
    CITES assertion is independently documented. Cycles produce no additional
    inferred CITES assertions.
evidence_requirements:
  - "Exactly one Evidence Type under Relationship Specification v1.0."
  - "At least one supporting Evidence Record."
  - "A recoverable citation location, Passage, Witness, or equivalent documentary basis."
  - "No inference from indirect citation chains."
lifecycle_status:
  label: "ACTIVE"
  controlled_vocabulary_status: "PENDING_REGISTRATION"
responsible_authority_id: "CAG-000000003"
version_history:
