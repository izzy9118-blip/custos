identifier: "PRD-000000004"
class: "Predicate"
canonical_label: "IS_QUOTED_BY"
predicate_family: "Documentary Reference"
formal_definition: >
  IS_QUOTED_BY means that the object is reproduced, cited verbatim, or
  near-verbatim transmitted by the subject as quoted source content through a
  recoverable quotation act.
scope_note: >
  An IS_QUOTED_BY assertion records inverse quotation orientation: the object
  is the quoted source and the subject contains the quoting reproduction.
  Citation without recoverable quoted textual reproduction does not constitute
  IS_QUOTED_BY.
inverse_predicate:
  label: "QUOTES"
  identifier: "PRD-000000003"
  assignment_status: "ASSIGNED"
permitted_subject_classes:
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
permitted_object_classes:
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
cardinality:
  subject_to_object: "ZERO_OR_MORE"
  object_from_subjects: "ZERO_OR_MORE"
symmetry: false
asymmetry: false
transitivity: false
reflexivity: false
inferability:
  value: "NO"
  rule: null
inference_conditions: null
cycle_rule:
  policy: "ALLOWED"
  note: >
    Reciprocal quotation chains are constitutionally permissible when each
    IS_QUOTED_BY assertion is independently evidenced. No additional
    IS_QUOTED_BY assertions are inferred from cycles.
evidence_requirements:
  - "Exactly one Evidence Type under Relationship Specification v1.0."
  - "At least one supporting Evidence Record."
  - "A recoverable quoted textual segment linking quoting content to quoted source content."
  - "A recoverable citation location or equivalent witness linkage identifying quoted source location."
  - "No inference from thematic similarity, paraphrase alone, or indirect quotation chains."
lifecycle_status:
  label: "ACTIVE"
  controlled_vocabulary_status: "PENDING_REGISTRATION"
responsible_authority_id: "CAG-000000003"
