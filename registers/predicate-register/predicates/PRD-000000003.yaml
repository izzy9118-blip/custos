identifier: "PRD-000000003"
class: "Predicate"
canonical_label: "QUOTES"
predicate_family: "Documentary Reference"
formal_definition: >
  QUOTES means that the subject reproduces, cites verbatim, or near-verbatim
  transmits a recoverable textual passage from the object as quoted source
  content.
scope_note: >
  A QUOTES assertion requires documentary evidence of textual reproduction from
  the object in the subject. Citation without quoted textual reproduction does
  not constitute QUOTES. General reference without citation location also does
  not constitute QUOTES.
inverse_predicate:
  label: "IS_QUOTED_BY"
  identifier: null
  assignment_status: "PLANNED_NOT_ASSIGNED"
permitted_subject_classes:
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
permitted_object_classes:
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
cardinality:
  subject_to_object: "ZERO_OR_MORE"
  object_from_subjects: "ZERO_OR_MORE"
symmetry: false
asymmetry: true
transitivity: false
reflexivity: false
inferability:
  value: "NO"
  rule: null
inference_conditions: null
cycle_rule:
  policy: "ALLOWED"
  note: >
    Reciprocal quotation chains are constitutionally permissible when each
    QUOTES assertion is independently evidenced. No additional QUOTES
    assertions are inferred from cycles.
evidence_requirements:
  - "Exactly one Evidence Type under Relationship Specification v1.0."
  - "At least one supporting Evidence Record."
  - "A recoverable quoted textual segment linking subject content to object content."
  - "A recoverable citation location or equivalent witness linkage identifying quoted source location."
  - "No inference from thematic similarity, paraphrase alone, or indirect quotation chains."
lifecycle_status:
  label: "ACTIVE"
  controlled_vocabulary_status: "PENDING_REGISTRATION"
responsible_authority_id: "CAG-000000003"
version_history:
