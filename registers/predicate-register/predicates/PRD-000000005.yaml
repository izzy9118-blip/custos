identifier: "PRD-000000005"
class: "Predicate"
canonical_label: "REFERS_TO"
predicate_family: "Documentary Reference"
formal_definition: >
  REFERS_TO means that the subject intentionally identifies, mentions,
  designates, discusses, or otherwise directs documentary attention toward the
  object without thereby asserting either an explicit documentary citation act
  or recoverable textual quotation.
scope_note: >
  Use REFERS_TO only when documentary reference exists but neither CITES nor
  QUOTES more accurately characterizes the relationship. When documentary
  evidence independently supports multiple relationships, multiple predicates
  may coexist.
inverse_predicate:
  label: "IS_REFERRED_TO_BY"
  identifier: null
  assignment_status: "PLANNED_NOT_ASSIGNED"
permitted_subject_classes:
  - "Citation"
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
permitted_object_classes:
  - "Citation"
  - "Work"
  - "Work Component"
  - "Expression"
  - "Witness"
  - "Witness Component"
  - "Passage"
cardinality:
  subject_to_object: "ZERO_OR_MORE"
  object_from_subjects: "ZERO_OR_MORE"
symmetry: false
asymmetry: false
transitivity: false
reflexivity: false
inferability:
  value: "NO"
  rule: null
inference_conditions: null
cycle_rule:
  policy: "ALLOWED"
  note: >
    Reciprocal documentary reference is constitutionally permissible when each
    REFERS_TO assertion is independently evidenced. Cycles produce no
    additional inferred REFERS_TO assertions.
evidence_requirements:
  - "Exactly one Evidence Type under Relationship Specification v1.0."
  - "At least one supporting Evidence Record."
  - "A recoverable documentary basis demonstrating intentional reference."
  - "No inference from indirect reference chains."
lifecycle_status:
  label: "ACTIVE"
  controlled_vocabulary_status: "PENDING_REGISTRATION"
responsible_authority_id: "CAG-000000003"
